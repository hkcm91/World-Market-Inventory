<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Market Inventory Assistant</title>
<style>
  :root{
    --bg:#f4efe6; --card:#fffdf8; --ink:#2c2419; --muted:#8a7d6a;
    --line:#e4dccb; --accent:#b0502f; --accent2:#3f6a4d; --gold:#c98a2b;
    --shadow:0 2px 10px rgba(60,45,25,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent}
  header{padding:16px 18px;background:var(--accent);color:#fff}
  header h1{margin:0;font-size:19px;letter-spacing:.2px}
  header p{margin:3px 0 0;font-size:12px;opacity:.9}
  .wrap{max-width:820px;margin:0 auto;padding:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
  .card h2{margin:0 0 10px;font-size:15px;display:flex;align-items:center;
    justify-content:space-between}
  .badge{background:var(--line);color:var(--muted);font-size:11px;
    padding:2px 8px;border-radius:20px;font-weight:600}
  #chat{height:230px;overflow-y:auto;padding:8px;background:#faf6ee;
    border:1px solid var(--line);border-radius:10px;font-size:13.5px}
  .msg{margin:6px 0;display:flex}
  .msg.user{justify-content:flex-end}
  .bubble{padding:8px 11px;border-radius:12px;max-width:82%;line-height:1.38}
  .user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:3px}
  .bot .bubble{background:#efe7d7;color:var(--ink);border-bottom-left-radius:3px}
  .row{display:flex;gap:8px;margin-top:10px}
  input[type=text],input[type=number],select{width:100%;padding:11px;border:1px solid var(--line);
    border-radius:10px;font-size:15px;background:#fff;color:var(--ink)}
  button{border:0;border-radius:10px;padding:11px 14px;font-size:14px;font-weight:600;
    cursor:pointer;color:#fff;background:var(--ink)}
  button:disabled{opacity:.4}
  .send{background:var(--accent2)}
  .mic{background:var(--accent);width:100%;margin-top:8px;font-size:15px;padding:13px}
  .mic.live{background:#8f2f18;animation:pulse 1.2s infinite}
  @keyframes pulse{50%{opacity:.7}}
  .cands{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .cands button{background:#fff;color:var(--accent);border:1px solid var(--accent);
    font-size:12px;padding:6px 9px}
  .cands button.alt{color:var(--accent2);border-color:var(--accent2)}
  .item{padding:8px;border-bottom:1px solid var(--line);font-size:13px}
  .item:last-child{border:0}
  .item b{font-weight:600}
  .item small{color:var(--muted)}
  .date-tag{display:inline-block;background:#f0e6d2;color:#8a5a1a;font-size:11px;
    padding:1px 7px;border-radius:20px;margin-left:6px;font-weight:600}
  .date-tag.soon{background:#f6d9cf;color:#9a2f14}
  .del{background:none;color:#b0502f;padding:2px 6px;font-size:12px;float:right}
  .tools{display:flex;gap:8px;flex-wrap:wrap}
  .tools button{flex:1;min-width:130px;background:var(--gold)}
  .tools .ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .addrow{display:grid;grid-template-columns:1fr 2fr 1fr auto;gap:6px;margin-bottom:8px}
  @media(max-width:560px){.addrow{grid-template-columns:1fr 1fr}}
  .empty{color:var(--muted);font-size:13px;padding:6px}
</style>
</head>
<body>
<header>
  <h1>World Market Inventory Assistant</h1>
  <p>Food section &middot; say it in any order &middot; SKUs &amp; dates matched automatically</p>
</header>
<div class="wrap">

  <div class="card">
    <h2>Assistant</h2>
    <div id="chat"></div>
    <div class="row">
      <input id="cmd" type="text" placeholder='e.g. "654182 Italian Adventure box expires Aug 12" or "Coca Cola 10 to 0"'>
      <button class="send" onclick="run(cmd.value)">Send</button>
    </div>
    <button id="micBtn" class="mic" onclick="toggleMic()">&#127908; Start voice input</button>
  </div>

  <div class="card">
    <h2>Expiry list <span class="badge" id="ec">0</span></h2>
    <div id="expiry"><div class="empty">Nothing yet.</div></div>
  </div>

  <div class="card">
    <h2>Inventory adjustments <span class="badge" id="ac">0</span></h2>
    <div id="adjust"><div class="empty">Nothing yet.</div></div>
  </div>

  <div class="card">
    <h2>Export</h2>
    <div class="tools">
      <button onclick="emailBoss()">&#9993;&#65039; Email to boss</button>
      <button onclick="downloadCSV()">&#11015;&#65039; Download CSV</button>
      <button class="ghost" onclick="copyData()">&#128203; Copy</button>
      <button class="ghost" onclick="backup()">&#128190; Backup JSON</button>
      <button class="ghost" onclick="fileIn.click()">&#128193; Restore</button>
      <input id="fileIn" type="file" accept=".json" style="display:none" onchange="restore(event)">
    </div>
  </div>

  <div class="card">
    <h2>Product encyclopedia <span class="badge" id="pc">0</span></h2>
    <div class="addrow">
      <input id="pSku" type="text" placeholder="SKU">
      <input id="pName" type="text" placeholder="Product name">
      <select id="pCat">
        <option>Candy</option><option>Drinks</option><option>Cookies</option>
        <option>Snacks</option><option>Savories</option><option>Uncategorized</option>
      </select>
      <button onclick="addProduct()">Add</button>
    </div>
    <div id="plist"></div>
  </div>

</div>
<script>
/* ================= storage ================= */
const LS='wm_inventory_v1';
let db={products:[],expiry:[],adjust:[]};
const seed=[
 ["WM001234","Ghirardelli Dark Chocolate Sea Salt Squares","Candy"],
 ["WM001235","Lindt Excellence Dark Chocolate Bar","Candy"],
 ["WM001236","Haribo Gold-Bears Gummy Candy","Candy"],
 ["WM001238","Toblerone Swiss Milk Chocolate","Candy"],
 ["WM002001","Pepperidge Farm Milano Cookies","Cookies"],
 ["WM002003","Tate's Bake Shop Chocolate Chip Cookies","Cookies"],
 ["WM003001","San Pellegrino Sparkling Mineral Water","Drinks"],
 ["WM003004","Fever-Tree Tonic Water","Drinks"],
 ["WM004001","Kettle Brand Sea Salt Potato Chips","Snacks"],
 ["WM004004","Terra Original Vegetable Chips","Snacks"],
 ["WM005001","Blue Diamond Smokehouse Almonds","Savories"],
 ["WM005003","Divina Kalamata Pitted Olives","Savories"]
];
function load(){
  try{const s=JSON.parse(localStorage.getItem(LS));if(s)db=s;}catch(e){}
  if(!db.products||!db.products.length){db.products=seed.map(a=>({sku:a[0],name:a[1],cat:a[2]}));}
  db.expiry=db.expiry||[];db.adjust=db.adjust||[];
}
function save(){localStorage.setItem(LS,JSON.stringify(db));}

/* ================= chat ================= */
const chat=document.getElementById('chat');
function say(text,who,buttons){
  who=who||'bot';
  const m=document.createElement('div');m.className='msg '+who;
  const b=document.createElement('div');b.className='bubble';b.innerHTML=text;
  if(buttons&&buttons.length){
    const c=document.createElement('div');c.className='cands';
    buttons.forEach(function(bt){
      const btn=document.createElement('button');
      if(bt.alt)btn.className='alt';
      btn.textContent=bt.label;
      btn.onclick=function(){c.parentElement.removeChild(c);bt.fn();};
      c.appendChild(btn);
    });
    b.appendChild(c);
  }
  m.appendChild(b);chat.appendChild(m);chat.scrollTop=chat.scrollHeight;
}

/* ================= date parsing ================= */
const MONTHS={january:0,jan:0,february:1,feb:1,march:2,mar:2,april:3,apr:3,may:4,
 june:5,jun:5,july:6,jul:6,august:7,aug:7,september:8,sep:8,sept:8,october:9,oct:9,
 november:10,nov:10,december:11,dec:11};
function midnight(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function fmtDate(d){
  const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const disp=d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  return {iso:iso,disp:disp};
}
/* returns {date:{iso,disp}|null, rest:string} */
function extractDate(text){
  var t=text, now=new Date(), today=midnight(now), found=null, matched=null;
  if(/\btoday\b/i.test(t)){found=fmtDate(today);matched=/\btoday\b/i;}
  else if(/\btomorrow\b/i.test(t)){var d=new Date(today);d.setDate(d.getDate()+1);found=fmtDate(d);matched=/\btomorrow\b/i;}
  else{
    var m=t.match(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)[a-z]*\.?\s+(\d{1,2})(?:st|nd|rd|th)?(?:,?\s*(\d{4}))?/i);
    if(m){
      var mo=MONTHS[m[1].toLowerCase()], day=+m[2], yr=m[3]?+m[3]:now.getFullYear();
      var dd=new Date(yr,mo,day);
      if(!m[3]&&dd<today)dd=new Date(yr+1,mo,day);
      found=fmtDate(dd);matched=m[0];
    } else {
      m=t.match(/\b(\d{1,2})(?:st|nd|rd|th)?\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)[a-z]*\.?/i);
      if(m){
        var mo2=MONTHS[m[2].toLowerCase()], day2=+m[1], dd2=new Date(now.getFullYear(),mo2,day2);
        if(dd2<today)dd2=new Date(now.getFullYear()+1,mo2,day2);
        found=fmtDate(dd2);matched=m[0];
      } else {
        m=t.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/);
        if(m){
          var mo3=+m[1]-1, day3=+m[2], yr3=m[3]?(+m[3]<100?2000+ +m[3]:+m[3]):now.getFullYear();
          var dd3=new Date(yr3,mo3,day3);
          if(!m[3]&&dd3<today)dd3=new Date(yr3+1,mo3,day3);
          found=fmtDate(dd3);matched=m[0];
        }
      }
    }
  }
  var rest=t;
  if(matched){
    rest=t.replace(matched,' ');
    // strip leftover expiry keywords / connectors around the date
    rest=rest.replace(/\b(expires?|expiration|expiry|exp|best\s*by|bb|use\s*by|on|by)\b/ig,' ');
  }
  return {date:found, rest:rest};
}

/* ================= quantity parsing ================= */
/* returns {oldQ,newQ,isAdjust,rest} ; order-flexible */
const NUMWORDS={zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12};
function w2n(s){return s in NUMWORDS?NUMWORDS[s]:(/^\d+$/.test(s)?+s:null);}
function extractQty(text){
  var t=text, oldQ=null, newQ=null, matched=null;
  var m=t.match(/(?:from|for)?\s*([a-z0-9]+)\s+to\s+([a-z0-9]+)/i);
  if(m && w2n(m[1].toLowerCase())!=null && w2n(m[2].toLowerCase())!=null){
    oldQ=w2n(m[1].toLowerCase());newQ=w2n(m[2].toLowerCase());matched=m[0];
  } else {
    m=t.match(/\b(?:to|=|change to|set to|adjust to|make it)\s*([a-z0-9]+)/i);
    if(m && w2n(m[1].toLowerCase())!=null){newQ=w2n(m[1].toLowerCase());matched=m[0];}
  }
  var isAdjust = (newQ!=null) || /\b(change|adjust|count|set|update|recount)\b/i.test(t);
  var rest=t;
  if(matched)rest=t.replace(matched,' ');
  rest=rest.replace(/\b(change|adjust|adjustment|count|recount|set|update|inventory|qty|quantity)\b/ig,' ');
  return {oldQ:oldQ,newQ:newQ,isAdjust:isAdjust,rest:rest};
}

/* ================= sku parsing ================= */
function norm(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'');}
/* returns {sku, product|null, rest} */
function extractSku(text){
  var nt=norm(text);
  // 1) any encyclopedia SKU embedded in the command
  var hit=null;
  for(var i=0;i<db.products.length;i++){
    var ps=norm(db.products[i].sku);
    if(ps.length>=3 && nt.indexOf(ps)!==-1){hit=db.products[i];break;}
  }
  if(hit){
    var re=new RegExp(hit.sku.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i');
    return {sku:hit.sku, product:hit, rest:text.replace(re,' ')};
  }
  // 2) a bare number that looks like a SKU (4+ digits)
  var m=text.match(/\b(\d{4,})\b/);
  if(m){return {sku:m[1], product:null, rest:text.replace(m[0],' ')};}
  return {sku:null, product:null, rest:text};
}

/* ================= name matching ================= */
const STOP=new Set(['add','put','please','to','the','on','a','an','list','expiry','expire',
 'expires','expired','expiration','needs','need','change','changed','changes','adjust',
 'adjustment','from','for','inventory','count','set','update','quantity','qty','of','is',
 'be','make','mark','it','this','that','and','my','we','i','have','got','can','you','item',
 'box','exp','bb','use','by','best','sku']);
function nameTokens(text){
  return text.toLowerCase().replace(/[^\w\s]/g,' ').split(/\s+/)
    .filter(function(w){return w && !STOP.has(w) && w2n(w)==null;});
}
function matchName(tokens){
  if(!tokens.length)return {top:null,cands:[],clear:false};
  var scored=db.products.map(function(p){
    var nts=p.name.toLowerCase().split(/\s+/), s=0;
    tokens.forEach(function(q){
      if(nts.some(function(n){return n===q;}))s+=2;
      else if(nts.some(function(n){return n.indexOf(q)!==-1||q.indexOf(n)!==-1;}))s+=1;
    });
    return {p:p,s:s};
  }).filter(function(x){return x.s>0;}).sort(function(a,b){return b.s-a.s;});
  if(!scored.length)return {top:null,cands:[],clear:false};
  var top=scored[0].s;
  var cands=scored.filter(function(x){return x.s>=top-1;}).slice(0,3).map(function(x){return x.p;});
  return {top:scored[0].p, cands:cands, clear:(cands.length===1||scored.length===1)};
}

/* ================= run a command (order-independent) ================= */
function run(raw){
  raw=(raw||'').trim();if(!raw)return;
  document.getElementById('cmd').value='';
  say(raw,'user');

  var wantsExpiry=/expir|best\s*by|\bbb\b|use\s*by/i.test(raw);

  var dr=extractDate(raw);
  var qr=extractQty(dr.rest);
  var sr=extractSku(qr.rest);
  var nmeTokens=nameTokens(sr.rest);
  var nm=matchName(nmeTokens);

  // decide action: adjustment if a quantity/adjust intent is present and no date
  var action = (qr.isAdjust && !dr.date) ? 'adjust' : ((dr.date||wantsExpiry) ? 'expiry' : (qr.isAdjust ? 'adjust' : 'expiry'));

  var pending={action:action, oldQ:qr.oldQ, newQ:qr.newQ, date:dr.date,
    rawSku:sr.sku, rawName:sr.rest.replace(/\s+/g,' ').trim()};

  // product resolution
  var product = sr.product || null;               // SKU hit in encyclopedia wins
  if(!product && nm.top && nm.clear) product=nm.top;

  if(product){ commit(product,pending); return; }

  if(nm.top && nm.cands.length){                  // ambiguous name -> ask
    window._pending=pending;
    var btns=nm.cands.map(function(p){return {label:(p.name.length>26?p.name.slice(0,26)+'\u2026':p.name), fn:function(){commit(p,pending);}};});
    say('\ud83e\udd14 Which one?','bot',btns);
    return;
  }

  // nothing in the encyclopedia matched -- keep everything the user said
  var label = pending.rawName || (pending.rawSku?('SKU '+pending.rawSku):'');
  if(!label){ say('\u2753 I got a command but no product \u2014 include a name or SKU.'); return; }

  commitLoose(pending);
  offerSave(pending);
}

/* commit against a known encyclopedia product */
function commit(prod,p){
  if(p.action==='adjust'){
    db.adjust.push({sku:prod.sku,name:prod.name,cat:prod.cat,oldQ:(p.oldQ!=null?p.oldQ:''),
      newQ:(p.newQ!=null?p.newQ:''),t:new Date().toLocaleString()});
    say('\u2705 Adjustment: <b>'+prod.name+'</b> ('+prod.sku+') '+(p.oldQ!=null?p.oldQ:'?')+' \u2192 '+(p.newQ!=null?p.newQ:'?'));
  } else {
    db.expiry.push({sku:prod.sku,name:prod.name,cat:prod.cat,
      exp:(p.date?p.date.iso:''),expDisp:(p.date?p.date.disp:''),t:new Date().toLocaleString()});
    say('\u2705 Expiry: <b>'+prod.name+'</b> ('+prod.sku+')'+(p.date?' \u2014 expires <b>'+p.date.disp+'</b>':' \u2014 <i>no date given</i>'));
  }
  save();render();
}

/* commit when the item isn't in the encyclopedia yet (nothing lost) */
function commitLoose(p){
  var name=p.rawName || ('SKU '+p.rawSku);
  if(p.action==='adjust'){
    db.adjust.push({sku:(p.rawSku||''),name:name,cat:'Uncategorized',oldQ:(p.oldQ!=null?p.oldQ:''),
      newQ:(p.newQ!=null?p.newQ:''),t:new Date().toLocaleString()});
    say('\u2705 Adjustment logged: <b>'+name+'</b>'+(p.rawSku?' ('+p.rawSku+')':'')+' '+(p.oldQ!=null?p.oldQ:'?')+' \u2192 '+(p.newQ!=null?p.newQ:'?'));
  } else {
    db.expiry.push({sku:(p.rawSku||''),name:name,cat:'Uncategorized',
      exp:(p.date?p.date.iso:''),expDisp:(p.date?p.date.disp:''),t:new Date().toLocaleString()});
    say('\u2705 Expiry logged: <b>'+name+'</b>'+(p.rawSku?' ('+p.rawSku+')':'')+(p.date?' \u2014 expires <b>'+p.date.disp+'</b>':''));
  }
  save();render();
}

/* offer to remember an unknown item in the encyclopedia */
function offerSave(p){
  var name=p.rawName || '';
  var sku=p.rawSku || '';
  if(!name && !sku) return;
  say("Not in the encyclopedia yet \u2014 want me to remember it?", 'bot', [
    {label:'\u2795 Save to encyclopedia', fn:function(){
      var n=name || prompt('Product name?','')||'';
      var s=sku || prompt('SKU?','')||'';
      if(!n && !s){return;}
      db.products.push({sku:s,name:n||('SKU '+s),cat:'Uncategorized'});
      save();render();
      say('\ud83d\udcd8 Saved <b>'+(n||('SKU '+s))+'</b>'+(s?' ('+s+')':'')+' \u2014 set its category below anytime.');
    }},
    {label:'No thanks', alt:true, fn:function(){say('Okay \u2014 left it off the encyclopedia.');}}
  ]);
}

/* ================= voice ================= */
var rec=null, live=false;
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  rec=new SR();rec.lang='en-US';rec.continuous=false;rec.interimResults=false;
  rec.onresult=function(e){run(e.results[0][0].transcript);};
  rec.onend=function(){live=false;micUI();};
  rec.onerror=function(e){live=false;micUI();say('\u26a0\ufe0f Mic error: '+e.error+' (allow microphone access).');};
}else{
  document.getElementById('micBtn').disabled=true;
  document.getElementById('micBtn').textContent='\ud83c\udfa4 Voice not supported here';
}
function toggleMic(){if(!rec)return;if(live){rec.stop();}else{try{rec.start();live=true;micUI();}catch(e){}}}
function micUI(){var b=document.getElementById('micBtn');
  b.classList.toggle('live',live);b.textContent=live?'\u23f9 Listening\u2026 tap to stop':'\ud83c\udfa4 Start voice input';}

/* ================= render ================= */
function daysTo(iso){if(!iso)return null;var d=new Date(iso+'T00:00:00');return Math.round((d-midnight(new Date()))/86400000);}
function render(){
  // expiry sorted soonest-first (undated last)
  var exs=db.expiry.map(function(x,i){return {x:x,i:i};}).sort(function(a,b){
    if(!a.x.exp&&!b.x.exp)return 0; if(!a.x.exp)return 1; if(!b.x.exp)return -1;
    return a.x.exp<b.x.exp?-1:(a.x.exp>b.x.exp?1:0);
  });
  var ex=document.getElementById('expiry');
  ex.innerHTML=exs.length?exs.map(function(o){
    var x=o.x, dd=daysTo(x.exp);
    var tag = x.expDisp ? '<span class="date-tag'+(dd!=null&&dd<=14?' soon':'')+'">'+x.expDisp+(dd!=null?' \u00b7 '+dd+'d':'')+'</span>' : '';
    return '<div class="item"><button class="del" onclick="rm(\'expiry\','+o.i+')">\u2715</button>'+
      '<b>'+x.name+'</b>'+tag+'<br><small>'+(x.sku||'no sku')+' \u00b7 '+x.cat+'</small></div>';
  }).join(''):'<div class="empty">Nothing yet.</div>';

  var aj=document.getElementById('adjust');
  aj.innerHTML=db.adjust.length?db.adjust.map(function(x,i){
    return '<div class="item"><button class="del" onclick="rm(\'adjust\','+i+')">\u2715</button>'+
      '<b>'+x.name+'</b><br><small>'+(x.sku||'no sku')+' \u00b7 '+x.oldQ+' \u2192 '+x.newQ+'</small></div>';
  }).join(''):'<div class="empty">Nothing yet.</div>';

  var pl=document.getElementById('plist');
  pl.innerHTML=db.products.map(function(p,i){
    return '<div class="item"><button class="del" onclick="rmProduct('+i+')">\u2715</button>'+
      '<b>'+p.name+'</b><br><small>'+p.sku+' \u00b7 '+p.cat+'</small></div>';
  }).join('');

  document.getElementById('ec').textContent=db.expiry.length;
  document.getElementById('ac').textContent=db.adjust.length;
  document.getElementById('pc').textContent=db.products.length;
}
function rm(list,i){db[list].splice(i,1);save();render();}
function rmProduct(i){db.products.splice(i,1);save();render();}
function addProduct(){
  var sku=pSku.value.trim(), name=pName.value.trim(), cat=pCat.value;
  if(!sku||!name){alert('SKU and name required');return;}
  db.products.push({sku:sku,name:name,cat:cat});save();render();
  pSku.value='';pName.value='';pName.focus();
}

/* ================= export ================= */
function sortedExpiry(){
  return db.expiry.slice().sort(function(a,b){
    if(!a.exp&&!b.exp)return 0; if(!a.exp)return 1; if(!b.exp)return -1;
    return a.exp<b.exp?-1:1;
  });
}
function csv(){
  var s='';
  var exs=sortedExpiry();
  if(exs.length){s+='EXPIRY LIST (soonest first)\nProduct,SKU,Category,Expires,Logged\n';
    exs.forEach(function(x){s+='"'+x.name+'",'+(x.sku||'')+','+x.cat+','+(x.expDisp||'')+',"'+x.t+'"\n';});s+='\n';}
  if(db.adjust.length){s+='INVENTORY ADJUSTMENTS\nProduct,SKU,Category,Old,New,Logged\n';
    db.adjust.forEach(function(x){s+='"'+x.name+'",'+(x.sku||'')+','+x.cat+','+x.oldQ+','+x.newQ+',"'+x.t+'"\n';});}
  return s||'No entries yet.';
}
function copyData(){navigator.clipboard.writeText(csv()).then(function(){say('\ud83d\udccb Copied \u2014 paste into Excel or email.');});}
function downloadCSV(){
  var b=new Blob([csv()],{type:'text/csv'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='worldmarket_inventory_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(u);
}
function emailBoss(){
  var body=encodeURIComponent(csv());
  var subj=encodeURIComponent('World Market Inventory \u2014 '+new Date().toLocaleDateString());
  window.location.href='mailto:?subject='+subj+'&body='+body;
}
function backup(){
  var b=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='worldmarket_backup.json';a.click();URL.revokeObjectURL(u);
}
function restore(e){
  var f=e.target.files[0];if(!f)return;var r=new FileReader();
  r.onload=function(){try{db=JSON.parse(r.result);save();render();say('\ud83d\udcbe Restored from backup.');}catch(err){alert('Bad file');}};
  r.readAsText(f);
}

/* ================= init ================= */
document.getElementById('cmd').addEventListener('keydown',function(e){if(e.key==='Enter')run(e.target.value);});
load();render();
