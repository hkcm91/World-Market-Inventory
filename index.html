<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Market Expiry Tracker</title>
<style>
  :root{
    --bg:#f4efe6; --card:#fffdf8; --ink:#2c2419; --muted:#8a7d6a;
    --line:#e4dccb; --accent:#b0502f; --accent2:#3f6a4d; --gold:#c98a2b;
    --shadow:0 2px 10px rgba(60,45,25,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent}
  header{padding:14px 18px;background:var(--accent);color:#fff}
  header h1{margin:0;font-size:18px}
  .wrap{max-width:820px;margin:0 auto;padding:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
  .card h2{margin:0 0 10px;font-size:15px;display:flex;align-items:center;justify-content:space-between}
  .badge{background:var(--line);color:var(--muted);font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
  .row{display:flex;gap:8px}
  input[type=text]{width:100%;padding:12px;border:1px solid var(--line);
    border-radius:10px;font-size:15px;background:#fff;color:var(--ink)}
  button{border:0;border-radius:10px;padding:12px 14px;font-size:14px;font-weight:600;cursor:pointer;color:#fff;background:var(--ink)}
  .send{background:var(--accent2)}
  #status{margin-top:9px;font-size:13px;min-height:18px;color:var(--accent2)}
  #status.err{color:#9a2f14}
  .mic{background:var(--accent);width:100%;margin-top:10px;font-size:15px;padding:14px}
  .mic.live{background:#8f2f18;animation:pulse 1.2s infinite}
  @keyframes pulse{50%{opacity:.65}}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;
    color:var(--muted);font-weight:700;padding:0 6px 6px;border-bottom:1px solid var(--line)}
  td{padding:9px 6px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:last-child td{border-bottom:0}
  td.sku{font-variant-numeric:tabular-nums;white-space:nowrap}
  td.exp{white-space:nowrap}
  .soon{color:#9a2f14;font-weight:600}
  .none{color:var(--muted)}
  td.x{width:26px;text-align:right}
  .del{background:none;color:#b0502f;padding:2px 4px;font-size:14px}
  .empty{color:var(--muted);font-size:13px;padding:6px}
  .tools{display:flex;gap:8px;flex-wrap:wrap}
  .tools button{flex:1;min-width:110px;background:var(--gold)}
  .tools .ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .tools .danger{background:#fff;color:#9a2f14;border:1px solid #e6c3ba}
</style>
</head>
<body>
<header><h1>World Market Expiry Tracker</h1></header>
<div class="wrap">

  <div class="card">
    <div class="row">
      <input id="cmd" type="text" placeholder='Say or type: "654178 Korean candy box expires Aug 29"'>
      <button class="send" onclick="run(cmd.value)">Add</button>
    </div>
    <div id="status"></div>
    <button id="micBtn" class="mic" onclick="toggleMic()">&#127908; Start voice input</button>
  </div>

  <div class="card">
    <h2>Expiring <span class="badge" id="ec">0</span></h2>
    <div id="expiry"><div class="empty">Nothing yet.</div></div>
  </div>

  <div class="card">
    <div class="tools">
      <button onclick="emailBoss()">&#9993;&#65039; Email</button>
      <button onclick="downloadCSV()">&#11015;&#65039; CSV</button>
      <button class="ghost" onclick="copyData()">&#128203; Copy</button>
      <button class="ghost" onclick="backup()">&#128190; Backup</button>
      <button class="ghost" onclick="fileIn.click()">&#128193; Restore</button>
      <button class="danger" onclick="clearAll()">&#128465;&#65039; Clear all</button>
      <input id="fileIn" type="file" accept=".json" style="display:none" onchange="restore(event)">
    </div>
  </div>

</div>
<script>
/* ============ storage ============ */
const LS='wm_expiry_v1';
let db={expiry:[]};
function load(){
  try{var s=JSON.parse(localStorage.getItem(LS));if(s&&s.expiry)db=s;}catch(e){}
  if(!db.expiry||!db.expiry.length){
    try{var old=JSON.parse(localStorage.getItem('wm_inventory_v2'));if(old&&old.expiry&&old.expiry.length){db.expiry=old.expiry;}}catch(e){}
  }
  db.expiry=db.expiry||[];
}
function save(){localStorage.setItem(LS,JSON.stringify(db));}

/* ============ status ============ */
function setStatus(t,err){var s=document.getElementById('status');s.textContent=t;s.className=err?'err':'';}

/* ============ date parsing ============ */
const MONTHS={january:0,jan:0,february:1,feb:1,march:2,mar:2,april:3,apr:3,may:4,
 june:5,jun:5,july:6,jul:6,august:7,aug:7,september:8,sep:8,sept:8,october:9,oct:9,
 november:10,nov:10,december:11,dec:11};
function midnight(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function fmtDate(d){
  var iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var disp=d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  return {iso:iso,disp:disp};
}
function extractDate(text){
  var t=text, now=new Date(), today=midnight(now), found=null, matched=null;
  if(/\btoday\b/i.test(t)){found=fmtDate(today);matched='today';}
  else if(/\btomorrow\b/i.test(t)){var d=new Date(today);d.setDate(d.getDate()+1);found=fmtDate(d);matched='tomorrow';}
  else{
    var m=t.match(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)[a-z]*\.?\s+(\d{1,2})(?:st|nd|rd|th)?(?:,?\s*(\d{4}))?/i);
    if(m){var mo=MONTHS[m[1].toLowerCase()],day=+m[2],yr=m[3]?+m[3]:now.getFullYear();
      var dd=new Date(yr,mo,day);if(!m[3]&&dd<today)dd=new Date(yr+1,mo,day);found=fmtDate(dd);matched=m[0];
    } else {
      m=t.match(/\b(\d{1,2})(?:st|nd|rd|th)?\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)[a-z]*\.?/i);
      if(m){var mo2=MONTHS[m[2].toLowerCase()],day2=+m[1],dd2=new Date(now.getFullYear(),mo2,day2);
        if(dd2<today)dd2=new Date(now.getFullYear()+1,mo2,day2);found=fmtDate(dd2);matched=m[0];
      } else {
        m=t.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/);
        if(m){var mo3=+m[1]-1,day3=+m[2],yr3=m[3]?(+m[3]<100?2000+ +m[3]:+m[3]):now.getFullYear();
          var dd3=new Date(yr3,mo3,day3);if(!m[3]&&dd3<today)dd3=new Date(yr3+1,mo3,day3);found=fmtDate(dd3);matched=m[0];}
      }
    }
  }
  var rest=t;
  if(matched){rest=t.replace(matched,' ')
    .replace(/\b(expires?|expiration|expiry|exp|best\s*by|bb|use\s*by|on|by)\b/ig,' ');}
  return {date:found,rest:rest};
}

/* ============ sku (5-6 digits, strip separators) ============ */
function digitsOnly(s){return s.replace(/\D/g,'');}
function extractSku(text){
  var m=text.match(/\bsku\s*#?\s*([\d\-\s]{5,10})/i);
  if(m){var d=digitsOnly(m[1]);if(d.length>=5&&d.length<=6){return {sku:d,rest:text.replace(m[0],' ')};}}
  var re=/\d[\d\-\s]*\d/g, mm;
  while((mm=re.exec(text))!==null){
    var g=digitsOnly(mm[0]);
    if(g.length===5||g.length===6){
      return {sku:g, rest:text.slice(0,mm.index)+' '+text.slice(mm.index+mm[0].length)};
    }
  }
  m=text.match(/\b(\d{5,6})\b/);
  if(m){return {sku:m[1],rest:text.replace(m[0],' ')};}
  return {sku:'',rest:text};
}

/* ============ name ============ */
const COMMAND=new Set(['add','put','please','mark','log','record','the','a','an','to','on',
 'of','for','list','needs','need','item','this','that','it','my','and','is','be','make','got',
 'have','box','expires','expire','expiry','exp']);
function cleanName(text){
  return text.replace(/[^\w\s\-'&]/g,' ').split(/\s+/)
    .filter(function(w){return w && !COMMAND.has(w.toLowerCase());})
    .join(' ').replace(/\s+/g,' ').trim();
}

/* ============ run (one entry per call) ============ */
function run(raw){
  raw=(raw||'').trim();if(!raw)return;
  document.getElementById('cmd').value='';
  var dr=extractDate(raw);
  var sr=extractSku(dr.rest);
  var name=cleanName(sr.rest);
  var label=name || (sr.sku?('SKU '+sr.sku):'');
  if(!label){setStatus('Need a product name or SKU.',true);return;}
  db.expiry.push({sku:sr.sku,name:label,exp:(dr.date?dr.date.iso:''),expDisp:(dr.date?dr.date.disp:''),t:new Date().toLocaleString()});
  setStatus('\u2713 '+label+(sr.sku?' \u00b7 '+sr.sku:'')+(dr.date?' \u00b7 '+dr.date.disp:' \u00b7 no date'));
  save();render();
}

/* ============ voice: continuous, ONE row per pause ============ */
var rec=null, live=false, buffer='', silenceTimer=null;
var SILENCE_MS=1800;
function scheduleCommit(){
  if(silenceTimer)clearTimeout(silenceTimer);
  silenceTimer=setTimeout(commitBuffer,SILENCE_MS);
}
function commitBuffer(){
  if(silenceTimer){clearTimeout(silenceTimer);silenceTimer=null;}
  var b=buffer.trim();buffer='';
  if(b)run(b);
}
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  rec=new SR();rec.lang='en-US';rec.continuous=true;rec.interimResults=true;
  rec.onresult=function(e){
    var interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      var r=e.results[i];
      if(r.isFinal){buffer+=' '+r[0].transcript;}
      else{interim+=r[0].transcript;}
    }
    var preview=(buffer+' '+interim).trim();
    if(preview)setStatus('\ud83c\udfa4 '+preview+' \u2026');
    scheduleCommit();            // reset the pause timer on ANY speech; commit only after silence
  };
  rec.onerror=function(e){
    if(e.error==='no-speech'||e.error==='aborted')return;
    setStatus('Mic: '+e.error+' (allow microphone access)',true);
  };
  rec.onend=function(){ if(live){ try{rec.start();}catch(e){} } else { micUI(); } };
}else{
  var mb=document.getElementById('micBtn');mb.disabled=true;mb.textContent='\ud83c\udfa4 Voice not supported here';
}
function toggleMic(){
  if(!rec)return;
  if(live){ live=false; commitBuffer(); rec.stop(); }
  else{ live=true; buffer=''; micUI(); setStatus('Listening \u2014 say one item, then pause.'); try{rec.start();}catch(e){} }
}
function micUI(){var b=document.getElementById('micBtn');
  b.classList.toggle('live',live);
  b.textContent=live?'\u23f9 Listening\u2026 pause between items \u00b7 tap to stop':'\ud83c\udfa4 Start voice input';}

/* ============ render ============ */
function daysTo(iso){if(!iso)return null;var d=new Date(iso+'T00:00:00');return Math.round((d-midnight(new Date()))/86400000);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function render(){
  var exs=db.expiry.map(function(x,i){return {x:x,i:i};}).sort(function(a,b){
    if(!a.x.exp&&!b.x.exp)return 0;if(!a.x.exp)return 1;if(!b.x.exp)return -1;
    return a.x.exp<b.x.exp?-1:(a.x.exp>b.x.exp?1:0);});
  var ex=document.getElementById('expiry');
  if(exs.length){
    var rows=exs.map(function(o){
      var x=o.x,dd=daysTo(x.exp);
      var exp=x.expDisp?('<span'+(dd!=null&&dd<=14?' class="soon"':'')+'>'+x.expDisp+(dd!=null?' \u00b7 '+dd+'d':'')+'</span>'):'<span class="none">\u2014</span>';
      return '<tr><td>'+esc(x.name)+'</td><td class="sku">'+(x.sku||'<span class="none">\u2014</span>')+'</td><td class="exp">'+exp+
        '</td><td class="x"><button class="del" onclick="rm('+o.i+')">\u2715</button></td></tr>';
    }).join('');
    ex.innerHTML='<table><thead><tr><th>Item</th><th>SKU</th><th>Expires</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
  } else ex.innerHTML='<div class="empty">Nothing yet.</div>';
  document.getElementById('ec').textContent=db.expiry.length;
}
function rm(i){db.expiry.splice(i,1);save();render();}
function clearAll(){
  if(!db.expiry.length){setStatus('Already empty.');return;}
  if(confirm('Clear all '+db.expiry.length+' items? This cannot be undone.')){
    db.expiry=[];save();render();setStatus('Cleared.');
  }
}

/* ============ export ============ */
function sortedExpiry(){return db.expiry.slice().sort(function(a,b){
  if(!a.exp&&!b.exp)return 0;if(!a.exp)return 1;if(!b.exp)return -1;return a.exp<b.exp?-1:1;});}
function csv(){
  var exs=sortedExpiry();
  if(!exs.length)return 'No entries yet.';
  var s='EXPIRING (soonest first)\nItem,SKU,Expires,Logged\n';
  exs.forEach(function(x){s+='"'+x.name+'",'+(x.sku||'')+','+(x.expDisp||'')+',"'+x.t+'"\n';});
  return s;
}
function copyData(){navigator.clipboard.writeText(csv()).then(function(){setStatus('\ud83d\udccb Copied to clipboard.');});}
function downloadCSV(){var b=new Blob([csv()],{type:'text/csv'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='worldmarket_expiry_'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(u);}
function emailBoss(){var body=encodeURIComponent(csv());
  var subj=encodeURIComponent('World Market Expiry \u2014 '+new Date().toLocaleDateString());
  window.location.href='mailto:?subject='+subj+'&body='+body;}
function backup(){var b=new Blob([JSON.stringify(db,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='worldmarket_expiry_backup.json';a.click();URL.revokeObjectURL(u);}
function restore(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();
  r.onload=function(){try{var j=JSON.parse(r.result);db.expiry=j.expiry||[];save();render();setStatus('\ud83d\udcbe Restored.');}catch(err){setStatus('Bad backup file.',true);}};
  r.readAsText(f);}

/* ============ init ============ */
document.getElementById('cmd').addEventListener('keydown',function(e){if(e.key==='Enter')run(e.target.value);});
load();render();
</script>
</body>
</html>
