<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Market Inventory Assistant</title>
<style>
  :root{
    --bg:#f4efe6; --card:#fffdf8; --ink:#2c2419; --muted:#8a7d6a;
    --line:#e4dccb; --accent:#b0502f; --accent2:#3f6a4d; --gold:#c98a2b;
    --shadow:0 2px 10px rgba(60,45,25,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent}
  header{padding:16px 18px;background:var(--accent);color:#fff}
  header h1{margin:0;font-size:19px;letter-spacing:.2px}
  header p{margin:3px 0 0;font-size:12px;opacity:.9}
  .wrap{max-width:820px;margin:0 auto;padding:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
  .card h2{margin:0 0 10px;font-size:15px;display:flex;align-items:center;
    justify-content:space-between}
  .badge{background:var(--line);color:var(--muted);font-size:11px;
    padding:2px 8px;border-radius:20px;font-weight:600}
  #chat{height:210px;overflow-y:auto;padding:8px;background:#faf6ee;
    border:1px solid var(--line);border-radius:10px;font-size:13.5px}
  .msg{margin:6px 0;display:flex}
  .msg.user{justify-content:flex-end}
  .bubble{padding:8px 11px;border-radius:12px;max-width:80%;line-height:1.35}
  .user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:3px}
  .bot .bubble{background:#efe7d7;color:var(--ink);border-bottom-left-radius:3px}
  .hint{color:var(--muted);font-size:12.5px}
  .row{display:flex;gap:8px;margin-top:10px}
  input[type=text],input[type=number],select{width:100%;padding:11px;border:1px solid var(--line);
    border-radius:10px;font-size:15px;background:#fff;color:var(--ink)}
  button{border:0;border-radius:10px;padding:11px 14px;font-size:14px;font-weight:600;
    cursor:pointer;color:#fff;background:var(--ink)}
  button:disabled{opacity:.4}
  .send{background:var(--accent2)}
  .mic{background:var(--accent);width:100%;margin-top:8px;font-size:15px;padding:13px}
  .mic.live{background:#8f2f18;animation:pulse 1.2s infinite}
  @keyframes pulse{50%{opacity:.7}}
  .cands{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .cands button{background:#fff;color:var(--accent);border:1px solid var(--accent);
    font-size:12px;padding:6px 9px}
  .item{padding:8px;border-bottom:1px solid var(--line);font-size:13px}
  .item:last-child{border:0}
  .item b{font-weight:600}
  .item small{color:var(--muted)}
  .del{background:none;color:#b0502f;padding:2px 6px;font-size:12px;float:right}
  .tools{display:flex;gap:8px;flex-wrap:wrap}
  .tools button{flex:1;min-width:130px;background:var(--gold)}
  .tools .ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .addrow{display:grid;grid-template-columns:1fr 2fr 1fr auto;gap:6px;margin-bottom:8px}
  @media(max-width:560px){.addrow{grid-template-columns:1fr 1fr}}
  .empty{color:var(--muted);font-size:13px;padding:6px}
</style>
</head>
<body>
<header>
  <h1>World Market Inventory Assistant</h1>
  <p>Food section &middot; voice + keyboard &middot; SKUs matched automatically</p>
</header>
<div class="wrap">

  <div class="card">
    <h2>Assistant</h2>
    <div id="chat"></div>
    <div class="row">
      <input id="cmd" type="text" placeholder='e.g. "add Ghirardelli squares to expiry" or "Coca Cola from 10 to 0"'>
      <button class="send" onclick="run(cmd.value)">Send</button>
    </div>
    <button id="micBtn" class="mic" onclick="toggleMic()">&#127908; Start voice input</button>
  </div>

  <div class="card">
    <h2>Expiry list <span class="badge" id="ec">0</span></h2>
    <div id="expiry"><div class="empty">Nothing yet.</div></div>
  </div>

  <div class="card">
    <h2>Inventory adjustments <span class="badge" id="ac">0</span></h2>
    <div id="adjust"><div class="empty">Nothing yet.</div></div>
  </div>

  <div class="card">
    <h2>Export</h2>
    <div class="tools">
      <button onclick="emailBoss()">&#9993;&#65039; Email to boss</button>
      <button onclick="downloadCSV()">&#11015;&#65039; Download CSV</button>
      <button class="ghost" onclick="copyData()">&#128203; Copy</button>
      <button class="ghost" onclick="backup()">&#128190; Backup JSON</button>
      <button class="ghost" onclick="fileIn.click()">&#128193; Restore</button>
      <input id="fileIn" type="file" accept=".json" style="display:none" onchange="restore(event)">
    </div>
  </div>

  <div class="card">
    <h2>Product encyclopedia <span class="badge" id="pc">0</span></h2>
    <div class="addrow">
      <input id="pSku" type="text" placeholder="SKU">
      <input id="pName" type="text" placeholder="Product name">
      <select id="pCat">
        <option>Candy</option><option>Drinks</option><option>Cookies</option>
        <option>Snacks</option><option>Savories</option>
      </select>
      <button onclick="addProduct()">Add</button>
    </div>
    <div id="plist"></div>
  </div>

</div>
<script>
/* ---------- storage ---------- */
const LS='wm_inventory_v1';
let db={products:[],expiry:[],adjust:[]};
const seed=[
 ["WM001234","Ghirardelli Dark Chocolate Sea Salt Squares","Candy"],
 ["WM001235","Lindt Excellence Dark Chocolate Bar","Candy"],
 ["WM001236","Haribo Gold-Bears Gummy Candy","Candy"],
 ["WM001238","Toblerone Swiss Milk Chocolate","Candy"],
 ["WM002001","Pepperidge Farm Milano Cookies","Cookies"],
 ["WM002003","Tate's Bake Shop Chocolate Chip Cookies","Cookies"],
 ["WM003001","San Pellegrino Sparkling Mineral Water","Drinks"],
 ["WM003004","Fever-Tree Tonic Water","Drinks"],
 ["WM004001","Kettle Brand Sea Salt Potato Chips","Snacks"],
 ["WM004004","Terra Original Vegetable Chips","Snacks"],
 ["WM005001","Blue Diamond Smokehouse Almonds","Savories"],
 ["WM005003","Divina Kalamata Pitted Olives","Savories"]
];
function load(){
  try{const s=JSON.parse(localStorage.getItem(LS));if(s)db=s;}catch(e){}
  if(!db.products||!db.products.length){
    db.products=seed.map(([sku,name,cat])=>({sku,name,cat}));
  }
  db.expiry=db.expiry||[];db.adjust=db.adjust||[];
}
function save(){localStorage.setItem(LS,JSON.stringify(db));}

/* ---------- chat ---------- */
const chat=document.getElementById('chat');
function say(text,who='bot',cands){
  const m=document.createElement('div');m.className='msg '+who;
  const b=document.createElement('div');b.className='bubble';b.innerHTML=text;
  if(cands&&cands.length){
    const c=document.createElement('div');c.className='cands';
    cands.forEach(p=>{
      const btn=document.createElement('button');
      btn.textContent=p.name.length>28?p.name.slice(0,28)+'\u2026':p.name;
      btn.onclick=()=>{c.parentElement.removeChild(c);commit(p,window._pending);};
      c.appendChild(btn);
    });
    b.appendChild(c);
  }
  m.appendChild(b);chat.appendChild(m);chat.scrollTop=chat.scrollHeight;
}

/* ---------- parsing ---------- */
const NUMWORDS={zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12};
const STOP=new Set(['add','put','please','to','the','on','a','an','list','expiry','expire',
 'expires','expired','expiration','needs','need','change','changed','changes','adjust',
 'adjustment','from','for','inventory','count','set','update','quantity','qty','of','is',
 'be','make','mark','it','this','that','and','my','we','i','have','got','can','you','item']);

function toNum(t){return t in NUMWORDS?NUMWORDS[t]:(/^\d+$/.test(t)?+t:null);}

function parse(raw){
  const text=' '+raw.toLowerCase().trim()+' ';
  const isExpiry=/expir/.test(text);
  let oldQ=null,newQ=null;
  let m=text.match(/(?:from|for)\s+([a-z0-9]+)\s+to\s+([a-z0-9]+)/);
  if(m){oldQ=toNum(m[1]);newQ=toNum(m[2]);}
  else{m=text.match(/\bto\s+([a-z0-9]+)\b/);if(m&&toNum(m[1])!=null)newQ=toNum(m[1]);}
  const isAdjust=!isExpiry && (newQ!=null || /change|adjust|count|set|update/.test(text));
  const words=raw.toLowerCase().replace(/[^\w\s]/g,' ').split(/\s+/)
    .filter(w=>w&&!STOP.has(w)&&toNum(w)==null);
  return {action:isExpiry?'expiry':(isAdjust?'adjust':'expiry'),oldQ,newQ,query:words};
}

/* ---------- matching ---------- */
function match(qWords,rawText){
  const raw=(rawText||'').toLowerCase();
  const skuHit=db.products.find(p=>raw.includes(p.sku.toLowerCase()));
  if(skuHit)return{best:[skuHit],top:skuHit,score:99};
  const scored=db.products.map(p=>{
    const nameTokens=p.name.toLowerCase().split(/\s+/);
    let s=0;
    qWords.forEach(q=>{
      if(nameTokens.some(nt=>nt===q)) s+=2;
      else if(nameTokens.some(nt=>nt.includes(q)||q.includes(nt))) s+=1;
    });
    return{p,s};
  }).filter(x=>x.s>0).sort((a,b)=>b.s-a.s);
  if(!scored.length)return{best:[],top:null,score:0};
  const topScore=scored[0].s;
  const near=scored.filter(x=>x.s>=topScore-1).slice(0,3).map(x=>x.p);
  return{best:near,top:scored[0].p,score:topScore,clear:near.length===1||scored.length===1};
}

/* ---------- run a command ---------- */
function run(raw){
  raw=(raw||'').trim();if(!raw)return;
  document.getElementById('cmd').value='';
  say(raw,'user');
  const p=parse(raw);
  if(!p.query.length){say("I didn't catch a product name \u2014 try again with the item name or SKU.");return;}
  const r=match(p.query,raw);
  if(!r.top){say('\u274c No match for that. Add it to the encyclopedia below, then try again.');return;}
  const pending={action:p.action,oldQ:p.oldQ,newQ:p.newQ};
  if(r.score>=99||r.clear){commit(r.top,pending);return;}
  window._pending=pending;
  say('\ud83e\udd14 Which one did you mean?','bot',r.best);
}

function commit(prod,pending){
  if(pending.action==='adjust'){
    db.adjust.push({sku:prod.sku,name:prod.name,cat:prod.cat,
      oldQ:pending.oldQ??'',newQ:pending.newQ??'',t:new Date().toLocaleString()});
    say('\u2705 Adjustment: <b>'+prod.name+'</b> ('+prod.sku+') '+(pending.oldQ??'?')+' \u2192 '+(pending.newQ??'?'));
  }else{
    db.expiry.push({sku:prod.sku,name:prod.name,cat:prod.cat,t:new Date().toLocaleString()});
    say('\u2705 Added to expiry: <b>'+prod.name+'</b> ('+prod.sku+')');
  }
  save();render();
}

/* ---------- voice ---------- */
let rec=null,live=false;
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
  rec=new SR();rec.lang='en-US';rec.continuous=false;rec.interimResults=false;
  rec.onresult=e=>{const t=e.results[0][0].transcript;run(t);};
  rec.onend=()=>{live=false;micUI();};
  rec.onerror=e=>{live=false;micUI();say('\u26a0\ufe0f Mic error: '+e.error+' (allow microphone access; HTTPS/GitHub Pages works best).');};
}else{
  document.getElementById('micBtn').disabled=true;
  document.getElementById('micBtn').textContent='\ud83c\udfa4 Voice not supported in this browser';
}
function toggleMic(){if(!rec)return;if(live){rec.stop();}else{try{rec.start();live=true;micUI();}catch(e){}}}
function micUI(){const b=document.getElementById('micBtn');
  b.classList.toggle('live',live);b.textContent=live?'\u23f9 Listening\u2026 tap to stop':'\ud83c\udfa4 Start voice input';}

/* ---------- render ---------- */
function render(){
  const ex=document.getElementById('expiry');
  ex.innerHTML=db.expiry.length?db.expiry.map((x,i)=>
    '<div class="item"><button class="del" onclick="rm(\'expiry\','+i+')">\u2715</button>'+
    '<b>'+x.name+'</b><br><small>'+x.sku+' \u00b7 '+x.cat+'</small></div>').join('')
    :'<div class="empty">Nothing yet.</div>';
  const aj=document.getElementById('adjust');
  aj.innerHTML=db.adjust.length?db.adjust.map((x,i)=>
    '<div class="item"><button class="del" onclick="rm(\'adjust\','+i+')">\u2715</button>'+
    '<b>'+x.name+'</b><br><small>'+x.sku+' \u00b7 '+x.oldQ+' \u2192 '+x.newQ+'</small></div>').join('')
    :'<div class="empty">Nothing yet.</div>';
  const pl=document.getElementById('plist');
  pl.innerHTML=db.products.map((p,i)=>
    '<div class="item"><button class="del" onclick="rmProduct('+i+')">\u2715</button>'+
    '<b>'+p.name+'</b><br><small>'+p.sku+' \u00b7 '+p.cat+'</small></div>').join('');
  document.getElementById('ec').textContent=db.expiry.length;
  document.getElementById('ac').textContent=db.adjust.length;
  document.getElementById('pc').textContent=db.products.length;
}
function rm(list,i){db[list].splice(i,1);save();render();}
function rmProduct(i){db.products.splice(i,1);save();render();}
function addProduct(){
  const sku=pSku.value.trim(),name=pName.value.trim(),cat=pCat.value;
  if(!sku||!name){alert('SKU and name required');return;}
  db.products.push({sku,name,cat});save();render();
  pSku.value='';pName.value='';pName.focus();
}

/* ---------- export ---------- */
function csv(){
  let s='';
  if(db.expiry.length){s+='EXPIRY LIST\nProduct,SKU,Category,Time\n';
    db.expiry.forEach(x=>s+='"'+x.name+'",'+x.sku+','+x.cat+',"'+x.t+'"\n');s+='\n';}
  if(db.adjust.length){s+='INVENTORY ADJUSTMENTS\nProduct,SKU,Category,Old,New,Time\n';
    db.adjust.forEach(x=>s+='"'+x.name+'",'+x.sku+','+x.cat+','+x.oldQ+','+x.newQ+',"'+x.t+'"\n');}
  return s||'No entries yet.';
}
function copyData(){navigator.clipboard.writeText(csv()).then(()=>say('\ud83d\udccb Copied \u2014 paste into Excel or email.'));}
function downloadCSV(){
  const b=new Blob([csv()],{type:'text/csv'});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;
  a.download='worldmarket_inventory_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(u);
}
function emailBoss(){
  const body=encodeURIComponent(csv());
  const subj=encodeURIComponent('World Market Inventory \u2014 '+new Date().toLocaleDateString());
  window.location.href='mailto:?subject='+subj+'&body='+body;
}
function backup(){
  const b=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;
  a.download='worldmarket_backup.json';a.click();URL.revokeObjectURL(u);
}
function restore(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{db=JSON.parse(r.result);save();render();say('\ud83d\udcbe Restored from backup.');}
    catch(err){alert('Bad file');}};
  r.readAsText(f);
}

/* ---------- init ---------- */
document.getElementById('cmd').addEventListener('keydown',e=>{if(e.key==='Enter')run(e.target.value);});
load();render();
say('Ready. Say or type things like <b>"add Toblerone to expiry"</b> or <b>"Kettle chips from 8 to 2"</b>. Build out the encyclopedia below with your real SKUs and it\'ll match them.');
</script>
</body>
</html>
